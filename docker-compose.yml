version: "3.9"

services:
  googleclaw:
    image: python:3.12-slim
    container_name: googleclaw
    ports:
      - "8080:8080"
    volumes:
      - googleclaw_data:/app/data
    restart: unless-stopped
    environment:
      - GC_HOST=0.0.0.0
    command: >
      bash -c "
        apt-get update -qq &&
        apt-get install -y -qq git &&
        git clone https://github.com/marcusai98/googleclaw /app &&
        pip install -q --no-cache-dir -r /app/requirements.txt &&
        cd /app &&
        python3 serve.py --no-browser --port 8080
      "

volumes:
  googleclaw_data:
