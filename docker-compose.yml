version: "3.9"

services:
  googleclaw:
    image: python:3.12-slim
    container_name: googleclaw
    ports:
      - "8080:8080"
    volumes:
      - googleclaw_data:/data
    restart: unless-stopped
    environment:
      - GC_HOST=0.0.0.0
      # Optional: pre-fill Google OAuth app credentials (Desktop app type)
      # Leave blank to let users enter their own in step 3 of the setup wizard
      - GC_GOOGLE_CLIENT_ID=
      - GC_GOOGLE_CLIENT_SECRET=
    command: >
      sh -c "
        apt-get update -qq &&
        apt-get install -y -qq git &&
        git clone https://github.com/marcusai98/googleclaw /tmp/gc &&
        mkdir -p /data &&
        ln -sf /data/config.json /tmp/gc/config.json &&
        pip install -q --no-cache-dir -r /tmp/gc/requirements.txt &&
        cd /tmp/gc &&
        python3 serve.py --no-browser --port 8080
      "

volumes:
  googleclaw_data:
